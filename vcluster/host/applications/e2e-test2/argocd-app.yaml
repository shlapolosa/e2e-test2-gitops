apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: e2e-test2
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/shlapolosa/e2e-test2-gitops
    targetRevision: main
    path: vcluster/host/applications/e2e-test2
    directory:
      include: '{application-claim.yaml,oam-application.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
