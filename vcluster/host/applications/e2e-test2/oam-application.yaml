apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: e2e-test2-app
  namespace: default
spec:
  components:
  - name: e2e-test2
    type: webservice
    properties:
      image: "healthidpuaeacr.azurecr.io/e2e-test2:v1.0.0"
      port: 8080
      healthPath: "/health"
      language: python
      framework: fastapi

      environment:
        LOG_LEVEL: "INFO"
        AGENT_TYPE: "e2e-test2"
  policies:
  - name: deploy-to-vcluster
    type: topology
    properties:
      clusters: ["host"]
      namespace: "default"
